<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="تحويل إلى نظام ACS Enterprise" />
  <meta http-equiv="refresh" content="0; url=/login" />
  <title>جاري الدخول إلى النظام</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --primary: #0f766e;
      --primary-hover: #115e59;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Tahoma, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #eef5ff 0%, var(--bg) 100%);
      color: var(--text);
    }
    .card {
      width: min(720px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.1);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }
    p {
      margin: 0 auto 18px;
      max-width: 56ch;
      color: var(--muted);
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.button {
      text-decoration: none;
      background: var(--primary);
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      transition: background-color 0.2s ease;
    }
    a.button:hover {
      background: var(--primary-hover);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>جاري تحويلك إلى النظام</h1>
    <p>إذا لم يتم التحويل تلقائيًا خلال لحظات، اضغط الزر التالي.</p>
    <div class="actions">
      <a class="button" href="/login">الدخول إلى النظام</a>
    </div>
  </main>
  <script>
    window.location.replace("/login");
  </script>
</body>
</html>
